@if(cargando()){
    <div>
        <p>Cargando...</p>
        <p class="spinner"></p>
    </div>
} @else {
    <div class="twitter-layout">
        <div class="contenedor-principal"> <nav class="barra-lateral">
                <ul>
                    <li><a href="/pages/publicaciones"><img class="logo" src="images/TwitterRebornLogo.png" alt="Twitter Foto"></a></li>
                    <li><a routerLink="/pages/publicaciones">Home</a></li>
                    <li><a [routerLink]="['/pages/perfil', nombreUsuario]">Mi Perfil</a></li>
                    <li><a (click)="onCerrarSesion()">Cerrar Sesión</a></li>
                </ul>
            </nav>
    
            <main class="contenedor-feed">
                <router-outlet></router-outlet>
            </main>
        </div>
    </div>
}
